<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Wiskunde</title>
    <script>
      // GitHub Pages SPA redirect
      // Redirects all 404s to index.html preserving the path
      var base = '/wiskunde/';
      var path = location.pathname.slice(base.length);
      var query = location.search;
      location.replace(base + '?' + 'p=/' + path + query);
    </script>
  </head>
  <body></body>
</html>
